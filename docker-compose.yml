services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: odeen
      POSTGRES_PASSWORD: odeen
      POSTGRES_DB: odeen
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_USER: odeen
      DB_PASSWORD: odeen
      DB_NAME: odeen
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend

volumes:
  db_data:
